<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Masters CD Póvoa</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Folha de estilos global — partilhada entre a área pública e a área privada -->
  <link rel="stylesheet" href="../../public/style.css" />
</head>
<body class="pagina-login">

  <div class="caixa-login">

    <!-- Cabeçalho: logótipo + título -->
    <div class="login-cabecalho">
      <div class="login-logo" aria-hidden="true">CDP</div>
      <h1>Área Privada</h1>
      <p>Introduz as tuas credenciais para aceder</p>
    </div>

    <!--
      ╔══════════════════════════════════════════════════════╗
      ║  INTEGRAÇÃO BACKEND                                  ║
      ║  Endpoint: POST /api/auth/login                      ║
      ║  Payload:  { email, password }                       ║
      ║  Resposta: { accessToken, refreshToken, user }       ║
      ╚══════════════════════════════════════════════════════╝
    -->
    <form class="form-login" id="form-login" novalidate>

      <!-- Campo email -->
      <div class="campo-form">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="o.teu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <!-- Campo password -->
      <div class="campo-form">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <!--
        BACKEND: ao submeter, o JavaScript abaixo fará POST /api/auth/login.
        Em caso de sucesso: guarda os tokens e redireciona para o dashboard.
        Em caso de erro: mostra a mensagem devolvida pela API.
      -->
      <button type="submit" class="btn-entrar">Entrar</button>

      <!-- Mensagem de erro injetada pelo JS após resposta da API -->
      <p
        class="mensagem-erro"
        id="mensagem-erro"
        role="alert"
        aria-live="polite"
        style="display:none; color:var(--vermelho); font-size:0.88rem; margin-top:14px; text-align:center;"
      ></p>

    </form>

    <div class="login-rodape">
      <a href="../../public/index.html">&larr; Voltar ao site</a>
    </div>

  </div>

  <script>
    /*
     * Lógica de autenticação — preparada para integração com o backend.
     *
     * Estado atual: redireciona para o dashboard sem validar.
     * Quando o backend estiver ativo, descomentar o bloco fetch abaixo
     * e remover a linha de redirect direto.
     */
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const erroEl   = document.getElementById('mensagem-erro');

      erroEl.style.display = 'none';

      // ── BACKEND (descomentar quando a API estiver ativa) ───────────────

      //     method: 'POST',
      //     headers: { 'Content-Type': 'application/json' },
      //     body: JSON.stringify({ email, password }),
      //   });
      //
      //   const data = await res.json();
      //
      //   if (!res.ok) {
      //     erroEl.textContent = data.mensagem || 'Erro ao autenticar.';
      //     erroEl.style.display = 'block';
      //     return;
      //   }
      //
      //   localStorage.setItem('accessToken',  data.dados.accessToken);
      //   localStorage.setItem('refreshToken', data.dados.refreshToken);
      //   localStorage.setItem('user', JSON.stringify(data.dados.user));
      //
      //   window.location.href = '../dashboard/index.html';
      //
      // } catch (err) {
      //   erroEl.textContent = 'Não foi possível ligar ao servidor. Tenta novamente.';
      //   erroEl.style.display = 'block';

      // ──────────────────────────────────────────────────────────────────

      /* Placeholder: redireciona diretamente enquanto o backend não está ativo */
      window.location.href = '../dashboard/index.html';
    });
  </script>

</body>
</html>
